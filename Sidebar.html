<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <link rel="stylesheet" href="https://ssl.gstatic.com/docs/script/css/add-ons1.css">
  <!-- The CSS package above applies Google styling to buttons and other elements. -->

  <style>
    .branding-below {
      bottom: 54px;
      top: 0;
    }

    #error.success {
      color: #008000;
    }

    #error.info {
      color: #000080;
    }

    #error {
      margin-bottom: 6px;
      height: 100px;
      overflow-x: hidden;
      overflow-y: scroll;
    }

    .branding-text {
      left: 7px;
      position: relative;
      top: 3px;
    }

    .logo {
      vertical-align: middle;
    }

    textarea {
      resize: vertical;
      width: 100%;
      height: 250px;
      margin-bottom: 6px;
    }

    .width-100 {
      width: 100%;
      box-sizing: border-box;
      -webkit-box-sizing: border-box;
      -moz-box-sizing: border-box;
    }

    .add-sample {
      margin-bottom: 6px;
    }

    .h4-sample {
      display: block;
      margin-bottom: 8px;
      margin-top: 2px;
    }

    #sample {
      width: 180px;
    }

    #add-sample {
      border-bottom: 2px;
    }

    label {
      font-weight: bold;
    }

    #creator-options,
    #respondent-options {
      background-color: #eee;
      border-color: #eee;
      border-width: 5px;
      border-style: solid;
      display: none;
    }

    #creator-email,
    #respondent-email,
    #button-bar,
    #submit-subject {
      margin-bottom: 10px;
    }

    #response-step {
      display: inline;
    }

    /* CSS animated spinner */
    .lds-ellipsis {
      display: inline-block;
      position: relative;
      width: 32px;
      height: 32px;
    }

    .lds-ellipsis div {
      position: absolute;
      top: 27px;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #f88;
      animation-timing-function: cubic-bezier(0, 1, 1, 0);
    }

    .lds-ellipsis div:nth-child(1) {
      left: 6px;
      animation: lds-ellipsis1 0.6s infinite;
    }

    .lds-ellipsis div:nth-child(2) {
      left: 6px;
      animation: lds-ellipsis2 0.6s infinite;
    }

    .lds-ellipsis div:nth-child(3) {
      left: 26px;
      animation: lds-ellipsis2 0.6s infinite;
    }

    .lds-ellipsis div:nth-child(4) {
      left: 45px;
      animation: lds-ellipsis3 0.6s infinite;
    }

    @keyframes lds-ellipsis1 {
      0% {
        transform: scale(0);
      }

      100% {
        transform: scale(1);
      }
    }

    @keyframes lds-ellipsis3 {
      0% {
        transform: scale(1);
      }

      100% {
        transform: scale(0);
      }
    }

    @keyframes lds-ellipsis2 {
      0% {
        transform: translate(0, 0);
      }

      100% {
        transform: translate(19px, 0);
      }
    }
  </style>
</head>

<body>

      <div class="block" id="button-bar">

        <button title="Append GIFT questions to end of current form" id="append-gift">Append to form</button>
        <div id="loading">

          <div></div>
          <div></div>

      </div>

    </form>
  </div>

  <div class="sidebar bottom">
    <img alt="Add-on logo" class="logo" width="25"

  <!-- Custom Modal for Confirmation -->

      <div style="text-align: right;">
        <button id="modal-cancel-btn" type="button" style="margin-right: 8px;">Cancel</button>
        <button id="modal-confirm-btn" type="button" class="create">Yes, Replace</button>
      </div>
    </div>
  </div>

  <script src="//ajax.googleapis.com/ajax/libs/jquery/1.9.1/jquery.min.js"></script>
